name: conmatch5050
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - --extra-index-url https://pypi.org/simple
      - torch==2.10.0
      - torchvision==0.25.0
      - torchaudio==2.10.0
      - numpy>=1.26,<2.0
      - scipy>=1.11
      - scikit-learn>=1.3
      - pandas>=2.0
      - pyyaml>=6.0
      - pillow>=9.5,<11
      - matplotlib>=3.7
      - tensorboard>=2.15
      - tensorboardx>=2.6
      - tqdm>=4.66
      - requests>=2.31
      - xlwt==1.3.0
